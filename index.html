<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KING STOR – Global Store PRO</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#000;color:#fff;}

header{
background:#0b0b0b;
text-align:center;
padding:20px;
border-bottom:2px solid gold;
}
header img{max-width:150px;}
header h2{color:gold;margin-top:10px;}

.lang{text-align:center;padding:10px;}
.lang button{padding:8px 12px;margin:5px;border:none;cursor:pointer;background:gold;font-weight:bold;}

nav{
display:flex;
justify-content:center;
gap:15px;
background:#111;
padding:10px;
flex-wrap:wrap;
}
nav a{color:gold;text-decoration:none;font-weight:bold;}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
border:1px solid gold;
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
}
.card img{width:100%;border-radius:10px;}
.card h3{color:gold;margin:10px 0;}

select,button,input,textarea{
width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;
}
button{background:gold;font-weight:bold;cursor:pointer;}

.cart{
position:fixed;
left:20px;
bottom:20px;
background:#111;
border:1px solid gold;
padding:15px;
border-radius:10px;
width:250px;
}
.cart h3{color:gold;}

.admin{
position:fixed;
right:20px;
bottom:20px;
background:#111;
border:1px solid gold;
padding:15px;
border-radius:10px;
width:260px;
}
.admin h3{color:gold;}

.product-page{
display:none;
padding:20px;
}

footer{text-align:center;padding:15px;background:#0b0b0b;border-top:2px solid gold;margin-top:20px;}

.ar{display:none;direction:rtl;}
</style></head>
<body><header>
<img src="logo.png">
<h2 class="fr">KING STOR – Global Luxury Store</h2>
<h2 class="ar">كينغ ستور – متجر عالمي فاخر</h2>
</header><div class="lang">
<button onclick="setLang('fr')">Français</button>
<button onclick="setLang('ar')">العربية</button>
</div><nav>
<a href="#" class="fr">HOME</a>
<a href="#" class="fr">STORE</a>
<a href="#" class="ar">الرئيسية</a>
<a href="#" class="ar">المتجر</a>
</nav><div class="container" id="products"></div><!-- PRODUCT PAGE --><div class="product-page" id="productPage">
<button onclick="closeProduct()">⬅ Back</button>
<div id="productDetails"></div>
</div><!-- CART --><div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<button onclick="sendOrder()">Send Order</button>
</div><!-- ADMIN PANEL --><div class="admin">
<h3>⚙ Admin</h3>
<input type="password" id="adminPass" placeholder="Password">
<button onclick="openAdmin()">Login</button><div id="adminPanel" style="display:none;">
<input id="pname" placeholder="Product name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<textarea id="pdesc" placeholder="Description"></textarea>
<button onclick="addProduct()">Add Product</button>
</div>
</div><footer>
<p>📞 0677669487</p>
<p>© 2026 KING STOR GLOBAL</p>
</footer><script>
let products=[
{id:1,name:"Luxury Shirt",price:199,img:"https://via.placeholder.com/300",desc:"Premium quality shirt"},
{id:2,name:"Elegant Dress",price:299,img:"https://via.placeholder.com/300",desc:"Royal elegant dress"}
];

let cart=[];

function render(){
let box=document.getElementById('products');
box.innerHTML='';
products.forEach(p=>{
box.innerHTML+=`
<div class='card' onclick='openProduct(${p.id})'>
<img src='${p.img}'>
<h3>${p.name}</h3>
<p>${p.price} DH</p>
</div>`;
});
}
render();

function openProduct(id){
let p=products.find(x=>x.id===id);
document.getElementById('productPage').style.display='block';
document.getElementById('products').style.display='none';
document.getElementById('productDetails').innerHTML=`
<h2 style='color:gold'>${p.name}</h2>
<img src='${p.img}' style='width:100%;max-width:300px'>
<p>${p.desc}</p>
<p>${p.price} DH</p>
<button onclick='addToCart(${p.id})'>Add to Cart</button>
`;
}

function closeProduct(){
document.getElementById('productPage').style.display='none';
document.getElementById('products').style.display='grid';
}

function addToCart(id){
let p=products.find(x=>x.id===id);
cart.push(p);
updateCart();
}

function updateCart(){
let box=document.getElementById('cartItems');
box.innerHTML='';
cart.forEach(c=>{
box.innerHTML+=`<p>${c.name} - ${c.price} DH</p>`;
});
}

function sendOrder(){
let msg="KING STOR ORDER:%0A";
cart.forEach(c=>{
msg+=`${c.name} - ${c.price} DH%0A`;
});
window.open("https://wa.me/212677669487?text="+msg,"_blank");
}

function openAdmin(){
let pass=document.getElementById('adminPass').value;
if(pass==='1234'){
document.getElementById('adminPanel').style.display='block';
}
}

function addProduct(){
let name=document.getElementById('pname').value;
let price=document.getElementById('pprice').value;
let img=document.getElementById('pimg').value;
let desc=document.getElementById('pdesc').value;

products.push({id:Date.now(),name,price,img,desc});
render();
}

function setLang(lang){
if(lang==='fr'){
document.querySelectorAll('.fr').forEach(e=>e.style.display='block');
document.querySelectorAll('.ar').forEach(e=>e.style.display='none');
document.body.dir='ltr';
}else{
document.querySelectorAll('.fr').forEach(e=>e.style.display='none');
document.querySelectorAll('.ar').forEach(e=>e.style.display='block');
document.body.dir='rtl';
}
}
setLang('fr');
</script></body>
</html>
